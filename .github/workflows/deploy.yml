name: Deploy to GitHub Pages (INAKTIV – hosting flyttad till Vercel)

# INAKTIVERAD 2026-07-05: hostingen flyttades till Vercel (Steg A Del 1).
# Auto-deploy sker nu på Vercel vid varje push till main. Den här workflowen
# körs INTE längre automatiskt (push-triggern borttagen) – annars skulle den
# publicera en BLANK sida på pgreen90.github.io/Learn-Bridge/ eftersom Vite
# base numera är "/" (matchar Vercel-roten, inte /Learn-Bridge/-subpathen).
# Filen behålls som referens och kan köras manuellt (workflow_dispatch) om vi
# någon gång vill återgå till Pages – men då måste base ändras tillbaka först.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # R5-fynd #1: grind före publicering. Kör typkontroll + hela testsviten så att
  # rött test eller typfel ALDRIG kan gå live obemärkt. build/deploy beror på detta.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsc          # typkontroll (tsconfig har noEmit)
      - run: npm test         # vitest run – hela sviten

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
