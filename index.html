<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#064e3b" />
    <!-- PWA / "Lägg till på hemskärmen" (Steg A Del 3). Manifest-länken injiceras
         av vite-plugin-pwa vid bygget; iPhone kräver dessa apple-taggar separat. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RebidZ" />
    <title>rebidz – spela och lär dig bridge</title>
    <meta
      name="description"
      content="rebidz – spela och lär dig bridge (2/1-systemet) direkt i webbläsaren."
    />
    <script>
      // Sätt mörkt läge FÖRE appen laddar, annars blinkar sidan vit en stund.
      // Sparat val vinner; utan sparat val följer vi systemets läge.
      // (Värdet är JSON-sparat av src/lib/storage.ts, därav citattecknen.)
      try {
        var saved = localStorage.getItem('learnbridge:theme')
        var dark =
          saved === '"dark"' ||
          (saved === null && matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) document.documentElement.classList.add('dark')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
